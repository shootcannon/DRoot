<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>./1996</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #030303;
            color: #fff;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, #030303 100%);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
        }

        /* Glitch title */
        .title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            animation: flicker 6s infinite;
        }

        .title::before,
        .title::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; right: 0;
            overflow: hidden;
        }

        .title::before {
            color: #ff0000;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            transform: translateX(-3px);
            animation: glitch-top 4s infinite;
        }

        .title::after {
            color: #00ffff;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            transform: translateX(3px);
            animation: glitch-bot 4s infinite;
        }

        @keyframes glitch-top {
            0%, 90%, 100% { transform: translateX(0); opacity: 0; }
            91% { transform: translateX(-4px); opacity: 1; }
            93% { transform: translateX(4px); opacity: 1; }
            95% { transform: translateX(0); opacity: 0; }
        }

        @keyframes glitch-bot {
            0%, 90%, 100% { transform: translateX(0); opacity: 0; }
            92% { transform: translateX(4px); opacity: 1; }
            94% { transform: translateX(-4px); opacity: 1; }
            96% { transform: translateX(0); opacity: 0; }
        }

        @keyframes flicker {
            0%, 97%, 99%, 100% { opacity: 1; }
            98% { opacity: 0.7; }
        }

        /* Red line */
        .line {
            width: 0;
            height: 1px;
            background: #ff0000;
            margin: 28px auto;
            animation: expand 1.2s 0.4s ease forwards;
            box-shadow: 0 0 8px #ff0000;
        }

        @keyframes expand {
            to { width: 80px; }
        }

        /* Subtitle */
        .sub {
            font-size: 0.72rem;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
            animation: fadein 1.5s 0.8s ease both;
        }

        @keyframes fadein {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Cursor blink on sub */
        .sub::after {
            content: '_';
            color: #ff0000;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 36px;
            animation: fadein 1s ease both;
        }

        .logo-wrap svg {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 0 12px rgba(255,0,0,0.5));
            animation: spin-slow 12s linear infinite;
        }

        @keyframes spin-slow {
            to { transform: rotate(360deg); }
        }

        .logo-inner {
            animation: spin-slow 12s linear infinite reverse;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            font-size: 0.6rem;
            color: #222;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: fadein 2s 1.2s ease both;
        }

        .footer span {
            color: #ff0000;
        }

        .crew {
            margin-top: 10px;
            font-size: 0.58rem;
            color: #333;
            letter-spacing: 3px;
            animation: fadein 2s 1.5s ease both;
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer hexagon ring -->
                <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5"
                    stroke="#ff0000" stroke-width="1.2" fill="none" opacity="0.6"/>
                <!-- Mid hexagon -->
                <polygon points="50,14 83,32 83,68 50,86 17,68 17,32"
                    stroke="#ff0000" stroke-width="0.6" fill="none" opacity="0.25"/>
                <!-- Inner group (counter-rotates) -->
                <g class="logo-inner" style="transform-origin:50px 50px">
                    <!-- Cross lines -->
                    <line x1="50" y1="22" x2="50" y2="78" stroke="#ff0000" stroke-width="0.8" opacity="0.4"/>
                    <line x1="22" y1="50" x2="78" y2="50" stroke="#ff0000" stroke-width="0.8" opacity="0.4"/>
                    <line x1="29" y1="29" x2="71" y2="71" stroke="#ff0000" stroke-width="0.8" opacity="0.4"/>
                    <line x1="71" y1="29" x2="29" y2="71" stroke="#ff0000" stroke-width="0.8" opacity="0.4"/>
                    <!-- Center image -->
                    <clipPath id="centerClip">
                        <circle cx="50" cy="50" r="28"/>
                    </clipPath>
                    <image href="https://i.ibb.co.com/qMrbQtqT/1996.png"
                        x="22" y="22" width="56" height="56"
                        clip-path="url(#centerClip)"
                        preserveAspectRatio="xMidYMid slice"/>
                    <circle cx="50" cy="50" r="28" stroke="#ff0000" stroke-width="0.8" fill="none" opacity="0.6"/>
                </g>
                <!-- Corner dots -->
                <circle cx="50" cy="4"  r="1.5" fill="#ff0000" opacity="0.7"/>
                <circle cx="93" cy="27.5" r="1.5" fill="#ff0000" opacity="0.7"/>
                <circle cx="93" cy="72.5" r="1.5" fill="#ff0000" opacity="0.7"/>
                <circle cx="50" cy="96" r="1.5" fill="#ff0000" opacity="0.7"/>
                <circle cx="7"  cy="72.5" r="1.5" fill="#ff0000" opacity="0.7"/>
                <circle cx="7"  cy="27.5" r="1.5" fill="#ff0000" opacity="0.7"/>
            </svg>
        </div>

        <h1 class="title" data-text="./GROOVY">./GROOVY</h1>
        <div class="line"></div>
        <p class="sub">Saat aku susah<br>mereka yang dulu kusebut teman justru jadi orang pertama yang pergi.<br>#GROOVY2K26</p>
        <div class="footer">— east <span>1996</span> —</div>
        <div class="crew">- [ kiko1337, noname, groovy ] -</div>
    </div>

</body>
</html>
